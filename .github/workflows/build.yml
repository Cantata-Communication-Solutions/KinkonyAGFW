name: Build Firmware

on:
  push:
    branches: [ "main", "master" ]
    paths:
      - 'KinkonyAGFW_Arduino/**'
  pull_request:
    branches: [ "main", "master" ]
    paths:
      - 'KinkonyAGFW_Arduino/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Arduino CLI
        uses: arduino/setup-arduino-cli@v2.0.0

      - name: Install ESP32 core
        run: |
          arduino-cli core update-index --additional-urls https://raw.githubusercontent.com/espressif/arduino-esp32/gh-pages/package_esp32_index.json
          arduino-cli core install esp32:esp32 --additional-urls https://raw.githubusercontent.com/espressif/arduino-esp32/gh-pages/package_esp32_index.json

      - name: Install Libraries
        run: |
          arduino-cli lib install "WebSockets"
          arduino-cli lib install "ArduinoJson"
          arduino-cli lib install "rc-switch"

      - name: Prepare Sketch Directory
        run: |
          mv KinkonyAGFW_Arduino Haptique_AGFW

      - name: Compile Sketch
        run: |
          arduino-cli compile --fqbn esp32:esp32:esp32 --output-dir build Haptique_AGFW/Haptique_AGFW.ino

      - name: Install esptool
        run: |
          python3 -m pip install --upgrade pip
          pip install esptool

      - name: Merge Binaries
        run: |
          esptool.py --chip esp32 merge_bin -o build/Haptique_AGFW_Merged.bin \
            --flash_mode dio --flash_freq 40m --flash_size 4MB \
            0x1000 build/Haptique_AGFW.ino.bootloader.bin \
            0x8000 build/Haptique_AGFW.ino.partitions.bin \
            0x10000 build/Haptique_AGFW.ino.bin

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: compiled-firmware
          path: build/Haptique_AGFW_Merged.bin
          if-no-files-found: ignore
